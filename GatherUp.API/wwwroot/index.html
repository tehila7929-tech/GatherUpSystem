<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GatherUp – Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 2rem; color: #764ba2; font-weight: 800; }
    .logo p  { color: #888; font-size: 0.9rem; margin-top: 4px; }
    .tabs { display: flex; margin-bottom: 28px; border-radius: 8px; overflow: hidden; border: 1px solid #e0e0e0; }
    .tab {
      flex: 1; padding: 10px; text-align: center; cursor: pointer;
      background: #f5f5f5; font-weight: 600; color: #888; transition: all .2s;
    }
    .tab.active { background: #764ba2; color: #fff; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 6px; font-weight: 600; }
    input {
      width: 100%; padding: 12px 14px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 1rem; outline: none; transition: border .2s;
    }
    input:focus { border-color: #764ba2; }
    button.btn {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff; border: none; border-radius: 8px; font-size: 1rem;
      font-weight: 700; cursor: pointer; transition: opacity .2s;
      margin-top: 8px;
    }
    button.btn:hover { opacity: 0.9; }
    .msg { text-align: center; margin-top: 14px; font-size: 0.9rem; }
    .msg.error { color: #e53e3e; }
    .msg.success { color: #38a169; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🎉 GatherUp</h1>
    <p>Event management made simple</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Sign In</div>
    <div class="tab" onclick="switchTab('register')">Register</div>
  </div>

  <!-- Login Form -->
  <div id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>ID Number (Password)</label>
      <input type="password" id="loginPassword" placeholder="Enter your ID number" />
    </div>
    <button class="btn" onclick="login()">Sign In</button>
  </div>

  <!-- Register Form -->
  <div id="registerForm" class="hidden">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="regName" placeholder="Your full name" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>ID Number (Password)</label>
      <input type="password" id="regPassword" placeholder="Enter your ID number" />
    </div>
    <button class="btn" onclick="register()">Create Account</button>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script>
  const API = '';

  function switchTab(tab) {
    document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
    document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
    document.querySelectorAll('.tab').forEach((t, i) =>
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'))
    );
    document.getElementById('msg').textContent = '';
  }

  async function login() {
    const email = document.getElementById('loginEmail').value;
    const passwordId = document.getElementById('loginPassword').value;
    const msg = document.getElementById('msg');
    try {
      const res = await fetch(`${API}/api/Auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, passwordId })
      });
      const data = await res.json();
      if (!res.ok) { msg.className = 'msg error'; msg.textContent = data.error || 'Login failed'; return; }
      localStorage.setItem('token', data.token);
      localStorage.setItem('userId', data.userId);
      localStorage.setItem('name', data.name);
      window.location.href = 'dashboard.html';
    } catch { msg.className = 'msg error'; msg.textContent = 'Server error. Please try again.'; }
  }

  async function register() {
    const name = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    const passwordId = document.getElementById('regPassword').value;
    const msg = document.getElementById('msg');
    try {
      const res = await fetch(`${API}/api/Auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, passwordId })
      });
      const data = await res.json();
      if (!res.ok) { msg.className = 'msg error'; msg.textContent = data.error || 'Registration failed'; return; }
      msg.className = 'msg success'; msg.textContent = 'Account created! Please sign in.';
      switchTab('login');
    } catch { msg.className = 'msg error'; msg.textContent = 'Server error. Please try again.'; }
  }
</script>
</body>
</html>
